name: Milestone Sync

on:
  workflow_call:
    inputs:
      milestone:
        description: GitHub milestone number or exact title
        required: false
        default: ""
        type: string
      config-path:
        description: Path to the milestone-sync config file in the caller repository
        required: false
        default: milestone-sync/config.yaml
        type: string
      node-version:
        description: Node.js version used to run the sync tool
        required: false
        default: "20"
        type: string
      tool-ref:
        description: Ref of scylladb-actions/workflows to checkout for the reusable workflow support files
        required: false
        default: main
        type: string
      github-event-name:
        description: Original caller GitHub event name for automatic sync
        required: false
        default: ""
        type: string
      github-event-payload:
        description: Original caller GitHub event payload serialized with toJson(github.event)
        required: false
        default: ""
        type: string
    secrets:
      USER_AND_KEY_FOR_JIRA_AUTOMATION:
        required: true

permissions:
  contents: read
  issues: write
  pull-requests: read

jobs:
  sync-milestone:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout caller repository
        uses: actions/checkout@v5
        with:
          path: caller-repo

      - name: Checkout workflow repository
        uses: actions/checkout@v5
        with:
          repository: scylladb-actions/workflows
          ref: ${{ inputs.tool-ref }}
          path: workflow-repo

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ inputs.node-version }}
          cache: npm
          cache-dependency-path: workflow-repo/.github/workflows/package-lock.json

      - name: Install tool dependencies
        working-directory: workflow-repo/.github/workflows
        run: npm ci

      - name: Validate caller config file
        env:
          CONFIG_PATH: ${{ github.workspace }}/caller-repo/${{ inputs.config-path }}
        run: |
          if [ ! -f "$CONFIG_PATH" ]; then
            echo "Config file not found: $CONFIG_PATH" >&2
            echo "Set 'config-path' to a file in the caller repository, for example 'milestone-sync/config.yaml'." >&2
            exit 1
          fi

      - name: Sync milestone to Jira
        working-directory: workflow-repo/.github/workflows
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          USER_AND_KEY_FOR_JIRA_AUTOMATION: ${{ secrets.USER_AND_KEY_FOR_JIRA_AUTOMATION }}
          INPUT_MILESTONE: ${{ inputs.milestone }}
          CALLER_GITHUB_EVENT_NAME: ${{ inputs.github-event-name }}
          CALLER_GITHUB_EVENT_PAYLOAD: ${{ inputs.github-event-payload }}
        run: |
          if [ -n "$CALLER_GITHUB_EVENT_NAME" ] && [ -n "$CALLER_GITHUB_EVENT_PAYLOAD" ]; then
            event_path="$RUNNER_TEMP/github-event.json"
            printf '%s' "$CALLER_GITHUB_EVENT_PAYLOAD" > "$event_path"

            node milestone-sync.js sync-event \
              --config "${{ github.workspace }}/caller-repo/${{ inputs.config-path }}" \
              --event-name "$CALLER_GITHUB_EVENT_NAME" \
              --event-path "$event_path"
            exit 0
          fi

          if [ -z "$INPUT_MILESTONE" ]; then
            echo "Provide either 'milestone' or both 'github-event-name' and 'github-event-payload'." >&2
            exit 1
          fi

          node milestone-sync.js sync \
            --config "${{ github.workspace }}/caller-repo/${{ inputs.config-path }}" \
            --milestone "$INPUT_MILESTONE"
